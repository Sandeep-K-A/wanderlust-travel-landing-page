<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wanderlust &mdash; Explore the World With Us</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header>
      <nav id="mainNav" class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="#hero">Wander<span>lust</span></a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu"
            aria-controls="navMenu"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div
            class="collapse navbar-collapse justify-content-end"
            id="navMenu"
          >
            <ul class="navbar-nav gap-1">
              <li class="nav-item">
                <a class="nav-link" href="#hero">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#destinations">Destinations</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#features">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#contact">Contact</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section id="hero" class="hero">
        <div class="container">
          <div class="row">
            <div class="col-lg-8 col-xl-7">
              <span class="hero-tag">&#10022; The World Awaits</span>
              <h1 class="hero-title">
                Explore the<br /><em>World</em> with Us
              </h1>
              <p class="hero-subtitle">
                Discover breathtaking destinations, plan unforgettable journeys,
                and experience travel reimagined for the modern explorer.
              </p>
              <div class="hero-cta d-flex flex-wrap gap-3">
                <a href="" class="btn-primary-custom">Start Your Journey</a>
                <a href="" class="btn-outline-custom">Learn More</a>
              </div>
            </div>
          </div>
        </div>
        <div class="hero-scroll">
          Scroll to explore
          <i class="bi bi-chevron-down"></i>
        </div>
      </section>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
